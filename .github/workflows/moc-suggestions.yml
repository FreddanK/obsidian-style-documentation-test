name: MOC Suggestions

on:
  push:
    branches:
      - main
    paths:
      - "Notes/**"
  schedule:
    # Run every Monday at 08:05 UTC (just after the link health check)
    - cron: "5 8 * * 1"
  workflow_dispatch:

jobs:
  update-mocs:
    name: Suggest unlisted notes to MOC owners
    runs-on: ubuntu-latest
    # Only run on the main branch so PRs don't auto-commit suggestions
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
        with:
          # Use a PAT or the default GITHUB_TOKEN with write permission
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run MOC updater
        run: python3 scripts/update_mocs.py

      - name: Commit MOC suggestions if anything changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Notes/
          if git diff --cached --quiet; then
            echo "No MOC changes to commit."
          else
            git commit -m "docs: auto-update MOC suggestion sections [skip ci]"
            git push
          fi

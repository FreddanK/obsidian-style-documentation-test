name: Wikilink Health Check

on:
  push:
    paths:
      - "Notes/**"
  pull_request:
    paths:
      - "Notes/**"
  schedule:
    # Run every Monday at 08:00 UTC
    - cron: "0 8 * * 1"
  workflow_dispatch:

jobs:
  check-links:
    name: Check for broken wikilinks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run link health check
        id: link_check
        # Don't fail the step here — we capture output and decide below
        run: |
          python3 scripts/check_links.py --report > link_report.md 2>&1 || echo "BROKEN_LINKS=true" >> $GITHUB_ENV
          cat link_report.md

      - name: Upload link report as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: link-health-report
          path: link_report.md

      - name: Post broken links as PR comment
        if: env.BROKEN_LINKS == 'true' && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('link_report.md', 'utf8');
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });

      - name: Open or update issue for scheduled broken-link runs
        if: env.BROKEN_LINKS == 'true' && github.event_name == 'schedule'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('link_report.md', 'utf8');
            const title = '⚠️ Broken wikilinks detected';
            const label = 'documentation';

            // Look for an existing open issue with the same title
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: label
            });
            const existing = issues.data.find(i => i.title === title);

            if (existing) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body: `Updated report (${new Date().toISOString().slice(0,10)}):\n\n${body}`
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: title,
                body: body,
                labels: [label]
              });
            }

      - name: Post status report to job summary
        if: always()
        run: |
          python3 scripts/status_report.py --report >> $GITHUB_STEP_SUMMARY

      - name: Fail if broken links found
        if: env.BROKEN_LINKS == 'true'
        run: |
          echo "Broken wikilinks were found. See link_report.md for details."
          exit 1

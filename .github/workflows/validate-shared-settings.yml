name: Validate Shared Settings

on:
  push:
    paths:
      - ".obsidian.shared/**"
      - "scripts/validate_shared_settings.py"
  pull_request:
    paths:
      - ".obsidian.shared/**"
      - "scripts/validate_shared_settings.py"

jobs:
  validate:
    name: Validate .obsidian.shared JSON and plugin pins
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run validation
        run: python3 scripts/validate_shared_settings.py
